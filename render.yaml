services:
  - type: web
    name: jperomingan-real-estate-api-staging
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /ready
    preDeployCommand: npx prisma migrate deploy
    initialDeployHook: npm run db:seed
    autoDeployTrigger: checksPass

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: APP_URL
        value: https://jperomingan-real-estate-api-staging.onrender.com

      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:5173

      - key: DATABASE_URL
        fromDatabase:
          name: real-estate-api-staging-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: SEED_ADMIN_EMAIL
        sync: false

      - key: SEED_ADMIN_PASSWORD
        sync: false

      - key: SEED_ADMIN_FIRST_NAME
        value: System

      - key: SEED_ADMIN_LAST_NAME
        value: Admin

databases:
  - name: real-estate-api-staging-db
    databaseName: real_estate_staging
    user: real_estate_staging_user
    plan: free
    region: singapore
    ipAllowList: []
