name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "chore/**"
      - "test/**"
      - "ci/**"

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: real_estate_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d real_estate_test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/real_estate_test_db?schema=public
      JWT_SECRET: test_secret_must_be_at_least_32_characters_long
      PORT: 4001
      APP_URL: http://localhost:4001
      ALLOWED_ORIGINS: http://localhost:4001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema to test database
        run: npx prisma db push

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Run coverage
        run: npm run test:coverage