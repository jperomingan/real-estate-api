services:
  postgres:
    image: postgres:16-alpine
    container_name: real_estate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - real_estate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-real_estate_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/real_estate_db?schema=public}
    container_name: real_estate_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/real_estate_db?schema=public}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-4000}
      APP_URL: ${APP_URL:-http://localhost:4000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4000,http://localhost:3000,http://localhost:5173}
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  real_estate_postgres_data:
